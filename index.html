<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayPlus+ - Streaming Platform</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            color: white;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #fff, #c0c0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            outline: none;
            width: 300px;
        }

        .search-input::placeholder { color: rgba(255, 255, 255, 0.6); }

        .main-content {
            margin-top: 80px;
            padding: 20px;
        }

        .status {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .channels-info {
            text-align: center;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .virtual-container {
            position: relative;
            overflow-y: auto;
            height: calc(100vh - 200px);
            scroll-behavior: smooth;
        }

        .virtual-content {
            position: relative;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 0 20px 0;
        }

        .channel-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            will-change: transform;
            transform: translateZ(0);
        }

        .channel-card:hover {
            transform: translateY(-5px) translateZ(0);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.08));
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .channel-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-url {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            display: none;
        }

        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            z-index: 2001;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-player {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .close-player:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #video-element {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 2002;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 999;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .scroll-to-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-to-top:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .search-input { width: 200px; }
            .channels-grid { 
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .virtual-container {
                height: calc(100vh - 150px);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">MayPlus+</div>
        <input type="text" class="search-input" placeholder="Buscar canales..." id="searchInput">
    </header>

    <main class="main-content">
        <div class="status" id="status">Cargando canales desde archivos M3U...</div>
        <div class="channels-info" id="channelsInfo" style="display: none;"></div>
        
        <div class="virtual-container" id="virtualContainer">
            <div class="virtual-content" id="virtualContent">
                <div class="channels-grid" id="channelsGrid"></div>
            </div>
        </div>
    </main>

    <button class="scroll-to-top" id="scrollToTop">↑</button>

    <div class="video-player" id="videoPlayer">
        <div class="player-header">
            <div class="player-title" id="playerTitle"></div>
            <button class="close-player" id="closePlayer">×</button>
        </div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Cargando canal...</div>
        </div>
        <video id="video-element" controls autoplay></video>
    </div>

    <script>
        let channels = [];
        let filteredChannels = [];
        let currentHls = null;
        let renderedChannels = [];
        let isRendering = false;
        let renderBatch = 50; // Renderizar en lotes de 50
        let currentBatch = 0;

        const channelsGrid = document.getElementById('channelsGrid');
        const searchInput = document.getElementById('searchInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const videoElement = document.getElementById('video-element');
        const playerTitle = document.getElementById('playerTitle');
        const closePlayer = document.getElementById('closePlayer');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const channelsInfo = document.getElementById('channelsInfo');
        const virtualContainer = document.getElementById('virtualContainer');
        const scrollToTop = document.getElementById('scrollToTop');

        // Función optimizada para renderizar canales por lotes
        function renderChannelsBatch() {
            if (isRendering) return;
            isRendering = true;

            const startIndex = currentBatch * renderBatch;
            const endIndex = Math.min(startIndex + renderBatch, filteredChannels.length);
            
            const fragment = document.createDocumentFragment();
            
            for (let i = startIndex; i < endIndex; i++) {
                const channel = filteredChannels[i];
                const channelCard = document.createElement('div');
                channelCard.className = 'channel-card';
                channelCard.innerHTML = `
                    <div class="channel-name" title="${channel.name}">${channel.name}</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 5px;">
                        🇽🇽  Pais: ${channel.file}
                    </div>
                    <div class="channel-url">📡 Subido por: MayPlus</div>
                `;
                
                channelCard.addEventListener('click', () => playChannel(channel));
                fragment.appendChild(channelCard);
            }
            
            channelsGrid.appendChild(fragment);
            renderedChannels = renderedChannels.concat(filteredChannels.slice(startIndex, endIndex));
            
            currentBatch++;
            isRendering = false;

            // Si hay más canales para renderizar, continuar después de un breve delay
            if (endIndex < filteredChannels.length) {
                requestAnimationFrame(() => {
                    setTimeout(renderChannelsBatch, 50);
                });
            }
        }

        // Función principal para inicializar el renderizado
        function renderChannels() {
            channelsGrid.innerHTML = '';
            renderedChannels = [];
            currentBatch = 0;
            isRendering = false;
            
            if (filteredChannels.length === 0) {
                channelsInfo.style.display = 'none';
                return;
            }

            channelsInfo.textContent = ``;
            channelsInfo.style.display = 'block';
            
            // Iniciar renderizado por lotes
            renderChannelsBatch();
        }

        // Scroll infinito optimizado
        virtualContainer.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = virtualContainer;
            
            // Mostrar/ocultar botón scroll to top
            if (scrollTop > 300) {
                scrollToTop.classList.add('visible');
            } else {
                scrollToTop.classList.remove('visible');
            }
            
            // Cargar más contenido si estamos cerca del final
            if (scrollTop + clientHeight >= scrollHeight - 1000 && 
                renderedChannels.length < filteredChannels.length && 
                !isRendering) {
                renderChannelsBatch();
            }
        });

        // Función para obtener todos los archivos M3U
        async function getM3UFiles() {
            try {
                const response = await fetch('canales/index.txt');
                if (response.ok) {
                    const content = await response.text();
                    return content.split('\n')
                        .map(line => line.trim())
                        .filter(line => line.endsWith('.m3u'))
                        .map(file => `canales/${file}`);
                }
            } catch (error) {
                console.log('No se encontró index.txt, probando archivos individuales...');
            }

            const possibleFiles = [
                'peru.m3u', 'deportes.m3u', 'entretenimiento.m3u', 'noticias.m3u',
                'cine.m3u', 'novelas.m3u', 'musica.m3u', 'infantil.m3u',
                'internacionales.m3u', 'premium.m3u', 'latinos.m3u', 'espana.m3u',
                'mexico.m3u', 'argentina.m3u', 'chile.m3u', 'colombia.m3u',
                'brasil.m3u', 'usa.m3u', 'uk.m3u', 'francia.m3u', 'italia.m3u',
                'alemania.m3u', 'religion.m3u', 'documentales.m3u', 'discovery.m3u',
                'history.m3u', 'nat_geo.m3u', 'animal_planet.m3u', 'cocina.m3u',
                'viajes.m3u', 'lifestyle.m3u', 'reality.m3u', 'cultura.m3u',
                'educacion.m3u', 'tech.m3u', '24_7.m3u', 'radio.m3u',
                'playlist.m3u', 'lista.m3u', 'canales.m3u', 'iptv.m3u',
                'tv.m3u', 'live.m3u', 'stream.m3u', 'channels.m3u',
                'lista1.m3u', 'lista2.m3u', 'lista3.m3u', 'lista4.m3u', 'lista5.m3u',
                'canales1.m3u', 'canales2.m3u', 'canales3.m3u',
                'iptv1.m3u', 'iptv2.m3u', 'iptv3.m3u',
                '2025.m3u', '2024.m3u', 'enero.m3u', 'febrero.m3u', 'marzo.m3u'
            ];

            const existingFiles = [];
            status.textContent = `Detectando archivos M3U... (0/${possibleFiles.length})`;

            for (let i = 0; i < possibleFiles.length; i++) {
                const file = `canales/${possibleFiles[i]}`;
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    if (response.ok) {
                        existingFiles.push(file);
                        status.textContent = `Detectando archivos M3U... (${i + 1}/${possibleFiles.length}) - Encontrados: ${existingFiles.length}`;
                    }
                } catch (error) {
                    // Archivo no existe, continuar
                }
            }

            return existingFiles;
        }

        // Función para leer archivos M3U
        async function loadM3UFiles() {
            try {
                status.textContent = 'Detectando archivos M3U en la carpeta...';
                
                const m3uFiles = await getM3UFiles();
                
                if (m3uFiles.length === 0) {
                    status.innerHTML = `
                        <div>No se detectaron archivos M3U</div>
                        <div style="font-size: 14px; margin-top: 10px; color: rgba(255,255,255,0.7);">
                            Coloca archivos .m3u en la carpeta "canales/"
                        </div>
                    `;
                    return;
                }

                status.textContent = `Procesando archivos M3U...`;
                
                let processedFiles = 0;
                for (const file of m3uFiles) {
                    try {
                        const response = await fetch(file);
                        if (response.ok) {
                            const content = await response.text();
                            parseM3U(content, file);
                            processedFiles++;
                            status.textContent = `⏳ Procesando... ¡Ya vamos en el ${processedFiles}%! ¡Apunta a ese 300%! (⁠・⁠∀⁠・⁠)`;
                        }
                    } catch (error) {
                        console.log(`No se pudo cargar: ${file}`);
                    }
                }

                if (channels.length > 0) {
                    status.textContent = `🎉 ¡${channels.length} canalcitos listos! Hora de disfrutar~ (⁠◍⁠•⁠ᴗ⁠•⁠◍⁠)⁠❤`;
                    filteredChannels = [...channels];
                    renderChannels();
                } else {
                    status.innerHTML = `
                        <div>Archivos M3U encontrados pero sin canales válidos</div>
                        <div style="font-size: 14px; margin-top: 10px; color: rgba(255,255,255,0.7);">
                            Verifica el formato de tus archivos .m3u
                        </div>
                    `;
                }
            } catch (error) {
                status.textContent = 'Error al cargar archivos M3U: ' + error.message;
            }
        }

        // Parsear contenido M3U
        function parseM3U(content, fileName) {
            const lines = content.split('\n');
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) {
                        currentChannel = {
                            name: nameMatch[1].trim(),
                            file: fileName.replace('canales/', '').replace('.m3u', '')
                        };
                    }
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
        }

        // Reproducir canal
        function playChannel(channel) {
            playerTitle.textContent = channel.name;
            videoPlayer.style.display = 'block';
            loading.style.display = 'block';
            
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
            
            videoElement.src = '';
            
            if (Hls.isSupported()) {
                currentHls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                currentHls.loadSource(channel.url);
                currentHls.attachMedia(videoElement);
                
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loading.style.display = 'none';
                    videoElement.play().catch(console.error);
                });
                
                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loading.innerHTML = '<div class="spinner"></div><div>Error de carga</div>';
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = channel.url;
                videoElement.addEventListener('loadedmetadata', () => {
                    loading.style.display = 'none';
                });
                videoElement.play().catch(console.error);
            }
        }

        // Búsqueda optimizada con debounce
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const searchTerm = e.target.value.toLowerCase();
                filteredChannels = channels.filter(channel => 
                    channel.name.toLowerCase().includes(searchTerm) ||
                    channel.file.toLowerCase().includes(searchTerm)
                );
                renderChannels();
            }, 300);
        });

        // Scroll to top
        scrollToTop.addEventListener('click', () => {
            virtualContainer.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Cerrar reproductor
        closePlayer.addEventListener('click', () => {
            videoPlayer.style.display = 'none';
            videoElement.pause();
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
        });

        // Cerrar con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoPlayer.style.display === 'block') {
                closePlayer.click();
            }
        });

        // Controles de teclado
        document.addEventListener('keydown', (e) => {
            if (videoPlayer.style.display === 'block') {
                switch(e.key) {
                    case ' ':
                        e.preventDefault();
                        videoElement.paused ? videoElement.play() : videoElement.pause();
                        break;
                    case 'f':
                        e.preventDefault();
                        document.fullscreenElement ? document.exitFullscreen() : videoElement.requestFullscreen();
                        break;
                }
            }
        });

        // Inicializar
        loadM3UFiles();
    </script>
</body>
</html>
